x-backend-base: &backend-base
  build:
    context: backend
    target: prod
  env_file:
    - docker.prod.env
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/healthz"]
    interval: 15s
    timeout: 3s
    retries: 10
    start_period: 20s
  volumes:
    - ./backend/static:/backend/static
  networks:
    - decompme

x-frontend-base: &frontend-base
  build:
    context: frontend
    target: prod
  env_file:
    - docker.prod.env
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
    interval: 15s
    timeout: 3s
    retries: 10
    start_period: 20s
  networks:
    - decompme

services:
  cromper:
    image: ghcr.io/decompme/decompme-cromper:${CROMPER_TAG:-latest}
    build:
      context: cromper
      target: prod
    cap_drop:
      - all
    cap_add:
      - setuid
      - setgid
      - setfcap
    env_file:
      - docker.prod.env
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    volumes:
      - ./cromper/compilers:/cromper/compilers:ro
      - ./cromper/libraries:/cromper/libraries:ro
    tmpfs:
      - /tmp/sandbox:exec,uid=1000,gid=1000,size=256M,mode=0700
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - decompme

  backend-blue:
    <<: *backend-base
    image: ghcr.io/decompme/decompme-backend:${BLUE_TAG:-latest}

  frontend-blue:
    <<: *frontend-base
    image: ghcr.io/decompme/decompme-frontend:${BLUE_TAG:-latest}
    environment:
      INTERNAL_API_BASE: http://backend-blue:8000/api
      INTERNAL_CROMPER_BASE: http://cromper:8888

  backend-green:
    <<: *backend-base
    image: ghcr.io/decompme/decompme-backend:${GREEN_TAG:-latest}

  frontend-green:
    <<: *frontend-base
    image: ghcr.io/decompme/decompme-frontend:${GREEN_TAG:-latest}
    environment:
      INTERNAL_API_BASE: http://backend-green:8000/api
      INTERNAL_CROMPER_BASE: http://cromper:8888

  nginx:
    image: ghcr.io/decompme/decompme-nginx:${NGINX_TAG:-latest}
    build:
      context: nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-healthz"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx/production/:/etc/nginx/conf.d/:ro
      - ./frontend/down.html:/var/www/decomp.me/down.html:ro
      - ./certbot:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
      - ./backend/media:/media
      - ./backend/static:/var/www/decomp.me/static
    networks:
      - decompme

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c"
    command: >
      "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done"
    networks:
      - decompme

  postgres:
    image: postgres:17
    env_file:
      - docker.prod.env
    restart: unless-stopped
    volumes:
      - ./postgres:/var/lib/postgresql/data
      - ./pgdump:/pgdump
    networks:
      - decompme
    command: >
      postgres -c shared_buffers=8GB -c work_mem=128MB -c maintenance_work_mem=2GB -c effective_cache_size=16GB -c wal_buffers=32MB -c checkpoint_completion_target=0.9 -c random_page_cost=1.1 -c effective_io_concurrency=300

networks:
  decompme:
    driver: bridge
